<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLB Sharp Intel — Live</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0c10; --surf:#111418; --card:#181c22; --border:#252d38; --text:#f0f4fa; --sub:#8899b0; --green:#1fdb8a; --blue:#4d9fff; --amber:#ffb733; --mono:'DM Mono', monospace; --sans:'DM Sans', sans-serif; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--sans); background:var(--bg); color:var(--text); }
    .header { height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; background:var(--surf); border-bottom:1px solid var(--border); }
    .shell { display:grid; grid-template-columns:240px 1fr; height:calc(100vh - 52px); }
    .sidebar { background:var(--surf); border-right:1px solid var(--border); overflow:auto; }
    .side-head { padding:12px; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:12px; color:var(--sub); }
    .game { padding:10px 12px; border-bottom:1px solid #1a2028; cursor:pointer; }
    .game.active { border-left:3px solid var(--blue); background:#122033; padding-left:9px; }
    .status-live{ color:var(--green);} .status-final{ color:var(--amber); }
    .main { overflow:auto; padding:14px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(220px,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; }
    .card h3 { font-family:var(--mono); font-size:12px; color:var(--sub); margin-bottom:8px; text-transform:uppercase; }
    .line { margin-bottom:7px; font-size:13px; }
    .ticker { max-height:220px; overflow:auto; }
    .pill { display:inline-block; border:1px solid var(--border); border-radius:999px; padding:2px 8px; margin-right:6px; font-size:11px; color:var(--sub); }
    .scoring { color:var(--green); font-weight:700; }
  </style>
</head>
<body>
<div class="header">
  <div><strong>MLB Sharp Intel</strong> · MLB Stats API only</div>
  <div id="clock"></div>
</div>
<div class="shell">
  <aside class="sidebar">
    <div class="side-head">Today's Games <button onclick="loadSchedule()">Refresh</button></div>
    <div id="games"></div>
  </aside>
  <main class="main">
    <div class="card" id="game-header"><h3>Game</h3><div>Select a game.</div></div>
    <div class="grid" style="margin-top:12px;">
      <section class="card"><h3>Live Ticker</h3><div id="live-ticker" class="ticker"></div></section>
      <section class="card"><h3>Current Matchup</h3><div id="current-matchup"></div></section>
      <section class="card"><h3>Pitch By Pitch</h3><div id="pitch-by-pitch"></div></section>
      <section class="card"><h3>Pitcher Card</h3><div id="pitcher-card"></div></section>
      <section class="card"><h3>Batter Card</h3><div id="batter-card"></div></section>
      <section class="card"><h3>Pitcher vs Batter</h3><div id="pvb"></div></section>
      <section class="card"><h3>Simple Angles</h3><div id="angles"></div></section>
      <section class="card"><h3>Next Pitch Expectation</h3><div id="next-pitch"></div></section>
      <section class="card" style="grid-column:1/-1"><h3>Game News / Buzz</h3><div id="buzz"></div></section>
    </div>
  </main>
</div>
<script>
let selectedGamePk = null;
let lastSignature = null;

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { timeZone:'America/New_York' }) + ' ET';
}, 1000);

async function j(url) { const r = await fetch(url); return r.json(); }

function gameLabel(g) {
  if (g.status === 'final') return `FINAL · ${g.teams.away.score}-${g.teams.home.score}`;
  if (g.status === 'live') return `LIVE · ${g.teams.away.score}-${g.teams.home.score}`;
  return new Date(g.startTime).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZone:'America/New_York' });
}

async function loadSchedule() {
  const data = await j('/api/schedule');
  const wrap = document.getElementById('games');
  wrap.innerHTML = '';
  data.games.forEach(g => {
    const div = document.createElement('div');
    div.className = 'game' + (selectedGamePk === g.gamePk ? ' active' : '');
    div.innerHTML = `<div class="line ${'status-'+g.status}">${gameLabel(g)}</div><div><strong>${g.teams.away.abbr}</strong> @ <strong>${g.teams.home.abbr}</strong></div>`;
    div.onclick = () => selectGame(g.gamePk);
    wrap.appendChild(div);
  });
  if (!selectedGamePk && data.games[0]) selectGame(data.games[0].gamePk);
}

function list(items, transform = x => x) {
  if (!items || !items.length) return '<div class="line">No data yet.</div>';
  return items.map(i => `<div class="line">${transform(i)}</div>`).join('');
}

async function renderGame() {
  if (!selectedGamePk) return;
  const [live, feed, matchup, buzz] = await Promise.all([
    j(`/api/live-summary?gamePk=${selectedGamePk}`),
    j(`/api/pitch-feed?gamePk=${selectedGamePk}`),
    j(`/api/matchup?gamePk=${selectedGamePk}`),
    j(`/api/game-buzz?gamePk=${selectedGamePk}`)
  ]);

  const sig = `${live.inning}-${live.half}-${live.outs}-${live.score.away}-${live.score.home}-${feed.latestPlay}`;
  if (lastSignature && lastSignature !== sig) console.log('Meaningful play-state change detected; refreshed view.');
  lastSignature = sig;

  document.getElementById('game-header').innerHTML = `<h3>Game</h3><div class="line"><strong>${live.status}</strong></div><div class="line">Inning: ${live.half || '-'} ${live.inning || '-'}, Outs: ${live.outs}</div><div class="line">Score: ${live.score.away} - ${live.score.home}</div>`;
  document.getElementById('current-matchup').innerHTML = `<div class="line"><strong>Batter:</strong> ${matchup.currentBatter?.fullName || '-'}</div><div class="line"><strong>Pitcher:</strong> ${matchup.currentPitcher?.fullName || '-'}</div><div class="line"><strong>Count:</strong> ${live.count.balls}-${live.count.strikes}</div>`;
  document.getElementById('pitch-by-pitch').innerHTML = list(feed.currentPlateAppearance, p => `<span class="pill">#${p.pitchNumber || '-'}</span>${p.type || p.details || 'Pitch'} ${p.speed ? `· ${p.speed} mph` : ''} · Count ${p.count}`);
  document.getElementById('live-ticker').innerHTML = list(feed.recentPlays, p => `<span class="${p.isScoringPlay ? 'scoring':''}">${p.isScoringPlay ? 'SCORING PLAY · ' : ''}</span>${p.desc || p.event || 'Play update'}`);

  const pCard = matchup.pitcherCard || {};
  document.getElementById('pitcher-card').innerHTML = `<div class="line"><strong>${pCard.name || '-'}</strong> (${pCard.hand || '-'})</div><div class="line">Whiff rate: ${pCard.whiffRate || '-'}%</div><div class="line">K rate: ${pCard.strikeoutRate || '-'}%</div><div class="line">Walk rate: ${pCard.walkRate || '-'}%</div><div class="line">Why this matters: more whiffs and fewer walks usually help outs and strikeout markets.</div>`;

  const bCard = matchup.batterCard || {};
  document.getElementById('batter-card').innerHTML = `<div class="line"><strong>${bCard.name || '-'}</strong> (${bCard.bats || '-'})</div><div class="line">Hard-hit: ${bCard.hardHitRate || '-'}%</div><div class="line">Whiff tendency: ${bCard.whiffTendency || '-'}%</div><div class="line">Chase tendency: ${bCard.chaseTendency || '-'}%</div><div class="line">Why this matters: hard-hit plus low chase usually supports better hitter outcomes.</div>`;

  document.getElementById('pvb').innerHTML = `<div class="line"><strong>Handedness:</strong> ${matchup.pitcherVsBatter?.handedness || '-'}</div>${list(matchup.pitcherVsBatter?.notes || [], x => x)}${list(matchup.pitcherVsBatter?.angles || [], a => `<strong>${a.title}:</strong> ${a.why}`)}`;
  document.getElementById('angles').innerHTML = list(matchup.simpleAngles || [], a => `<strong>${a.title}:</strong> ${a.summary}<br/><span style="color:var(--sub)">Why bettors care: ${a.bettorWhy}</span>`);
  document.getElementById('next-pitch').innerHTML = list(matchup.nextPitchExpectation?.probabilities || [], p => `${p.pitchType}: <strong>${p.pct}%</strong>`) + `<div class="line" style="color:var(--sub)">${matchup.nextPitchExpectation?.explanation || ''}</div>`;
  document.getElementById('buzz').innerHTML = list(buzz.items || [], b => `<strong>${b.headline}</strong> · ${b.text}`) + list(buzz.links || [], l => `<a href="${l}" target="_blank">MLB Game Link</a>`);
}

async function selectGame(gamePk) { selectedGamePk = gamePk; await loadSchedule(); await renderGame(); }

setInterval(() => { loadSchedule(); }, 60000);
setInterval(() => { if (selectedGamePk) renderGame(); }, 8000);

loadSchedule();
</script>
</body>
</html>
