<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MLB Live Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── MLB / FANDUEL-QUALITY THEME ──────────────────────────────
       Navy foundation · Crisp white type · Red accent · Gold live
       Reference: FanDuel Sportsbook dark interface + MLB.com colours
    ───────────────────────────────────────────────────────────── */
    :root {
      /* Backgrounds — deep navy hierarchy */
      --bg:        #0e1117;   /* page bg — near-black navy */
      --surface:   #141921;   /* sidebar, header, banner */
      --card:      #1a2130;   /* panel surfaces */
      --card-2:    #1f2840;   /* inset cells, row alt */
      /* Borders */
      --border:    #26334a;
      --border-soft:#1e2d3e;
      /* Typography */
      --text:      #f0f4fc;   /* primary white */
      --sub:       #8fa6c8;   /* secondary */
      --muted:     #445b78;   /* tertiary / labels */
      /* Accent — MLB red */
      --red:       #e8182c;
      --red-dim:   rgba(232,24,44,0.13);
      --red-mid:   rgba(232,24,44,0.25);
      /* Live green */
      --live:      #00d26a;
      --live-dim:  rgba(0,210,106,0.12);
      /* Blue — FanDuel / info */
      --blue:      #1f8ef1;
      --blue-dim:  rgba(31,142,241,0.12);
      --blue-mid:  rgba(31,142,241,0.22);
      /* Gold — counts, amber alerts */
      --gold:      #f5b942;
      --gold-dim:  rgba(245,185,66,0.12);
      --red-mid:   rgba(232,24,44,0.22);
      /* Header accent stripe */
      --accent-stripe: #e8182c;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* ── HEADER ── */
    .header{
      height:54px;
      background:var(--surface);
      border-bottom:2px solid var(--accent-stripe);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;flex-shrink:0;
      position:relative;
    }
    /* subtle red glow under header */
    .header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,24,44,.4),transparent)}
    .logo{display:flex;align-items:center;gap:11px}
    .logo-icon{
      width:32px;height:32px;
      background:var(--red);
      border-radius:6px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:#fff;
      letter-spacing:.5px;
    }
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:.3px;color:var(--text)}
    .logo-text span{color:var(--red)}
    .header-right{display:flex;align-items:center;gap:10px}
    .level-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
    select,.btn{
      background:var(--card-2);color:var(--text);
      border:1px solid var(--border);border-radius:5px;
      padding:6px 12px;
      font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;
      cursor:pointer;transition:border-color .15s,background .15s;
    }
    select:focus,.btn:focus{outline:none;border-color:var(--blue)}
    select:hover{border-color:var(--blue)}
    .btn-refresh{
      background:var(--red-dim);border-color:var(--red);color:var(--red);
      display:flex;align-items:center;gap:5px;
    }
    .btn-refresh:hover{background:var(--red);color:#fff}

    /* ── SHELL ── */
    .shell{display:flex;flex:1;min-height:0;overflow:hidden}

    /* ── SIDEBAR ── */
    .sidebar{width:248px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sidebar-head{
      padding:11px 14px 9px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .sidebar-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    .date-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
    #games{flex:1;overflow-y:auto;padding:0}
    #games::-webkit-scrollbar{width:3px}
    #games::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* ── GAME CARD ── */
    .game-card{
      padding:11px 14px 9px;
      border-bottom:1px solid var(--border-soft);
      cursor:pointer;transition:background .1s;
    }
    .game-card:hover{background:rgba(31,142,241,.06)}
    .game-card.active{
      background:var(--blue-dim);
      border-left:3px solid var(--blue);
      padding-left:11px;
    }
    .game-status{
      font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;
      letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;
    }
    .game-status.live{color:var(--live)}
    .game-status.final{color:var(--gold)}
    .game-status.preview{color:var(--muted)}

    /* Two-team row with fixed columns so dots align */
    .card-teams{display:flex;align-items:center;gap:0;width:100%}
    .card-team{display:flex;align-items:center;gap:5px;flex:1}
    .card-team.home{justify-content:flex-end}
    .team-logo-sm{width:22px;height:22px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .team-logo-sm img{width:100%;height:100%;object-fit:contain}
    .team-abbr{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--text)}
    .card-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--sub);min-width:14px;text-align:center}
    .card-sep{font-size:12px;color:var(--muted);padding:0 6px;flex-shrink:0}

    /* Dots row — same two-column structure as card-teams */
    .card-dots{display:flex;align-items:center;gap:0;width:100%;margin-top:5px}
    .dots-away{display:flex;gap:3px;flex:1}
    .dots-home{display:flex;gap:3px;flex:1;justify-content:flex-end}
    .fg-dot{width:7px;height:7px;border-radius:50%}
    .fg-dot.W{background:var(--live)}
    .fg-dot.L{background:var(--red)}
    .fg-dot.T{background:var(--gold)}

    .card-time{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:4px}
    .card-live-row{display:flex;align-items:center;gap:8px;margin-top:4px;margin-bottom:1px}
    .card-inning{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--live);letter-spacing:.5px}
    .card-final-tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;color:var(--gold)}
    .card-score-lead{color:var(--text)!important;font-weight:700}
    .card-live-pip{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite;vertical-align:middle}

    /* ── MAIN ── */
    .main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

    /* ── BANNER ── */
    .banner{
      flex-shrink:0;
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:0 20px;height:66px;
      display:flex;align-items:center;gap:0;
    }
    .banner-team{display:flex;align-items:center;gap:10px}
    .team-logo-lg{
      width:38px;height:38px;border-radius:7px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      background:var(--card-2);border:1px solid var(--border);
    }
    .team-logo-lg img{width:100%;height:100%;object-fit:contain}
    .banner-score-block{text-align:center;min-width:100px}
    .banner-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:28px;line-height:1;color:var(--text)}
    .banner-live-state{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-width:72px;padding:0 4px;gap:4px;
    }
    .banner-inning-wrap{display:flex;flex-direction:column;align-items:center;line-height:1}
    .banner-half{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
    .banner-inning-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--text);line-height:1}
    .banner-outs{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.3px}
    /* Runner diamond — fixed 32x28 box so it never shifts */
    .runner-diamond{position:relative;width:32px;height:28px;flex-shrink:0}
    .runner-diamond .base{
      position:absolute;width:10px;height:10px;
      border:1.5px solid var(--border);
      transform:rotate(45deg);border-radius:1px;
      background:transparent;transition:background .2s,border-color .2s;
    }
    .runner-diamond .base.on{background:var(--gold);border-color:var(--gold)}
    /* Fixed positions: 2B top-centre, 3B left, 1B right */
    .runner-diamond #r2{top:0;left:50%;margin-left:-5px}
    .runner-diamond #r3{bottom:0;left:0}
    .runner-diamond #r1{bottom:0;right:0}
    .banner-score-sub{font-size:11px;color:var(--sub);margin-top:2px;min-height:14px}
    .banner-sep{width:1px;height:34px;background:var(--border);margin:0 16px;flex-shrink:0}
    .banner-section{display:flex;flex-direction:column;justify-content:center}
    .banner-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
    .banner-value{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;color:var(--text)}
    .banner-count{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;color:var(--gold)}
    .banner-state{font-size:12px;color:var(--sub)}
    .live-dot{display:inline-block;width:7px;height:7px;background:var(--live);border-radius:50%;margin-right:5px;animation:pulse 1.6s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

    /* ── CONTENT ── */
    .content{flex:1;overflow-y:auto;padding:12px}
    .content::-webkit-scrollbar{width:5px}
    .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .grid-wide{grid-column:span 2}
    .grid-full{grid-column:span 3}

    /* ── PANEL ── */
    .panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;overflow:hidden;
      display:flex;flex-direction:column;
    }
    .panel-head{
      padding:8px 13px;
      border-bottom:1px solid var(--border-soft);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
      background:rgba(255,255,255,.02);
    }
    .panel-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    .panel-badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
    .panel-body{padding:10px 13px;flex:1;overflow-y:auto}
    .panel-body::-webkit-scrollbar{width:3px}
    .panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* ── ITEMS ── */
    .item{
      padding:7px 10px;background:var(--card-2);
      border:1px solid var(--border-soft);border-radius:5px;
      margin-bottom:5px;font-size:13px;line-height:1.5;color:var(--sub);
    }
    .item:last-child{margin-bottom:0}
    .item strong{color:var(--text)}
    .tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-right:4px}
    .tag-live{background:var(--live-dim);color:var(--live)}
    .tag-info{background:var(--blue-dim);color:var(--blue)}

    /* ── PREGAME ── */
    .pregame-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .pregame-team-header{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border-soft);margin-bottom:10px}
    .pregame-logo{width:48px;height:48px;border-radius:9px;overflow:hidden;background:var(--card-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .pregame-logo img{width:100%;height:100%;object-fit:contain}
    .pregame-team-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;color:var(--text)}
    .pregame-record{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub)}
    .pregame-last5{display:flex;gap:4px;margin-top:5px;align-items:center}
    .last5-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-right:4px}
    .last5-pill{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;padding:2px 7px;border-radius:3px}
    .last5-pill.W{background:var(--live-dim);color:var(--live)}
    .last5-pill.L{background:var(--red-dim);color:var(--red)}
    .last5-pill.T{background:var(--gold-dim);color:var(--gold)}
    .section-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:2px}
    .spotlight-card{background:var(--card-2);border:1px solid var(--border-soft);border-radius:6px;padding:9px 11px 9px 14px;margin-bottom:6px;position:relative;overflow:hidden}
    .spotlight-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
    .spotlight-card.is-starter::before{background:var(--blue)}
    .spotlight-card.is-hot::before{background:var(--live)}
    .spotlight-card.is-cold::before{background:var(--red)}
    .spotlight-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
    .spotlight-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--text)}
    .spotlight-badge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;flex-shrink:0;margin-left:6px}
    .badge-hot{background:var(--live-dim);color:var(--live)}
    .badge-cold{background:var(--red-dim);color:var(--red)}
    .badge-starter{background:var(--blue-dim);color:var(--blue)}
    .spotlight-stat{font-size:12px;color:var(--sub);line-height:1.5}
    .spotlight-stat strong{color:var(--gold)}
    .spotlight-extra{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45}

    /* ── STAT BARS ── */
    .bar-group{margin-bottom:8px}
    .bar-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px;color:var(--sub)}
    .bar-label span:last-child{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text)}
    .bar-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
    .bar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .5s ease}
    .bar-fill.green{background:var(--live)}
    .bar-fill.amber{background:var(--gold)}
    .bar-fill.red{background:var(--red)}
    .stat-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-soft)}
    .stat-row:last-child{border-bottom:none}
    .stat-key{font-size:12px;color:var(--sub)}
    .stat-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--text)}

    /* ── MIX GRID ── */
    .mix-grid{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
    .mix-chip{flex:1;min-width:50px;background:var(--card-2);border:1px solid var(--border-soft);border-radius:5px;padding:6px 7px;text-align:center}
    .mix-abbr{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--muted);letter-spacing:1px}
    .mix-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--text)}
    .mix-vel{font-size:10px;color:var(--muted)}

    /* ── MATCHUP ── */
    .matchup-display{display:flex;align-items:center;gap:8px}
    .matchup-player{flex:1;background:var(--card-2);border:1px solid var(--border-soft);border-radius:7px;padding:9px 10px;text-align:center}
    .matchup-role{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
    .matchup-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--text)}
    .matchup-vs{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:var(--muted)}
    .matchup-hand{display:inline-block;margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);background:var(--blue-dim);border:1px solid var(--blue-mid);padding:1px 6px;border-radius:3px}

    /* ── PITCH CHIPS ── */
    .pitch-probs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .pitch-chip{display:flex;flex-direction:column;align-items:center;background:var(--card-2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;min-width:64px;flex:1}
    .pitch-chip.top{border-color:var(--red);background:var(--red-dim)}
    .pitch-type{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--sub)}
    .pitch-chip.top .pitch-type{color:var(--red)}
    .pitch-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;color:var(--text);line-height:1.2}
    .pitch-chip.top .pitch-pct{color:var(--text)}
    .pitch-unit{font-size:10px;color:var(--muted)}

    /* ── PITCH ROW ── */
    .pitch-row{display:grid;grid-template-columns:22px 1fr auto auto auto;gap:6px;align-items:center;padding:5px 8px;background:var(--card-2);border:1px solid var(--border-soft);border-radius:5px;margin-bottom:4px;font-size:12px}
    .pitch-row:last-child{margin-bottom:0}
    .pitch-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:center}
    .pitch-desc{color:var(--sub)}
    .pitch-spd{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:var(--text)}
    .pitch-call{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;padding:1px 5px;border-radius:3px;letter-spacing:.5px}
    .call-strike{background:var(--red-dim);color:var(--red)}
    .call-ball{background:var(--blue-dim);color:var(--blue)}
    .call-hit{background:var(--live-dim);color:var(--live)}
    .call-other{background:var(--border);color:var(--sub)}
    .pitch-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}

    /* ── LINEUP TABLE ── */
    .lineup-side{padding:10px 13px;border-right:1px solid var(--border-soft)}
    .lineup-side:last-child{border-right:none}
    .lineup-header{display:flex;align-items:center;gap:7px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border-soft)}
    .lineup-team-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--text)}
    .lineup-col-today{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-left:auto;min-width:70px;text-align:right}
    .lineup-col-season{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);min-width:80px;text-align:right}
    .lineup-row{display:grid;grid-template-columns:18px 1fr 28px auto auto;gap:5px;align-items:center;padding:4px 6px;border-radius:4px;margin-bottom:2px;transition:background .1s}
    .lineup-row:hover{background:var(--card-2)}
    .lineup-row.active-batter{background:var(--red-dim);border:1px solid var(--red-mid)}
    .lineup-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:right}
    .lineup-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lineup-pos{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--muted);text-align:center}
    .lineup-today{font-family:'JetBrains Mono',monospace;font-size:10px;text-align:right;white-space:nowrap;min-width:70px}
    .lineup-season{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sub);text-align:right;white-space:nowrap;min-width:80px}
    /* ── IN-PLAY STATS ── */
    .inplay-section{margin-bottom:12px}
    .inplay-section:last-child{margin-bottom:0}
    .inplay-player{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--text);margin-bottom:6px}
    .inplay-role{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
    .inplay-summary{font-size:13px;color:var(--sub);margin-bottom:6px}
    .inplay-summary strong{color:var(--gold)}
    .pitch-meter{margin:6px 0 8px}
    .pitch-meter-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:3px}
    .pitch-meter-fill{height:100%;border-radius:3px;transition:width .4s ease}
    .pitch-meter-label{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
    .pa-log{display:flex;flex-direction:column;gap:3px;margin-top:4px}
    .pa-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);padding:3px 6px;background:var(--card-2);border-radius:3px}
    .pa-inn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--muted);min-width:36px}
    .pa-result{color:var(--text)}
    .pa-result.positive{color:var(--live)}
    .pa-result.hr{color:var(--gold)}
    /* ── BUZZ TYPE TAGS ── */
    .buzz-type{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-right:5px;flex-shrink:0}
    .buzz-type.scoring{background:var(--live-dim);color:var(--live)}
    .buzz-type.warning{background:var(--red-dim);color:var(--red)}
    .buzz-type.info{background:var(--blue-dim);color:var(--blue)}
    .buzz-type.high{background:var(--gold-dim);color:var(--gold)}
    .angle-card{background:var(--card-2);border:1px solid var(--border-soft);border-left:3px solid var(--red);border-radius:0 5px 5px 0;padding:8px 10px;margin-bottom:6px}
    .angle-card:last-child{margin-bottom:0}
    .angle-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--text);margin-bottom:2px}
    .angle-why{font-size:12px;color:var(--sub)}
    .buzz-item{display:flex;gap:8px;align-items:flex-start;padding:7px 10px;background:var(--card-2);border:1px solid var(--border-soft);border-radius:5px;margin-bottom:5px}
    .buzz-item:last-child{margin-bottom:0}
    .buzz-dot{width:6px;height:6px;border-radius:50%;background:var(--red);margin-top:5px;flex-shrink:0}
    .buzz-text{font-size:13px;color:var(--sub)}
    .buzz-text strong{color:var(--text)}

    /* ── UTILS ── */
    .empty{color:var(--muted);font-size:13px;text-align:center;padding:16px 0;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.3px}
    .loading{color:var(--muted);font-size:12px;padding:10px 13px;display:flex;align-items:center;gap:6px}
    .spin{width:12px;height:12px;border:1.5px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:1200px){.grid{grid-template-columns:repeat(2,1fr)}.grid-wide{grid-column:span 2}.grid-full{grid-column:span 2}}
    @media(max-width:800px){
      .shell{flex-direction:column}
      .sidebar{width:100%;height:185px;border-right:none;border-bottom:1px solid var(--border)}
      #games{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden}
      .game-card{min-width:155px;border-bottom:none;border-right:1px solid var(--border-soft)}
      .grid{grid-template-columns:1fr}.grid-wide,.grid-full{grid-column:span 1}
      .pregame-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">MLB</div>
    <div class="logo-text">Live<span>Tracker</span></div>
  </div>
  <div class="header-right">
    <span class="level-label">View Level</span>
    <select id="knowledgeLevel">
      <option value="new">New Fan</option>
      <option value="intermediate" selected>Intermediate</option>
      <option value="experienced">Experienced</option>
    </select>
    <button class="btn btn-refresh" id="refreshSlate">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10.5 6A4.5 4.5 0 1 1 7.5 1.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10.5 1v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
  </div>
</div>

<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">Today's Games</span>
      <span class="date-tag" id="sidebarDate">—</span>
    </div>
    <div id="games"><div class="loading"><div class="spin"></div> Loading…</div></div>
  </aside>

  <div class="main">
    <div class="banner" id="banner">
      <!-- LEFT: live game state (inning + runners) — hidden until live -->
      <div class="banner-live-state" id="bnLiveState" style="display:none">
        <div class="banner-inning-wrap">
          <span class="banner-half" id="bnHalf">TOP</span>
          <span class="banner-inning-num" id="bnInning">1st</span>
        </div>
        <div class="runner-diamond">
          <div class="base" id="r2"></div>
          <div class="base" id="r3"></div>
          <div class="base" id="r1"></div>
        </div>
        <div class="banner-outs" id="bnOuts">0 outs</div>
      </div>
      <div class="banner-sep" id="bnLiveSep" style="display:none"></div>

      <!-- AWAY TEAM -->
      <div class="banner-team">
        <div class="team-logo-lg" id="bnAwayLogo"></div>
        <div>
          <div class="banner-value" id="bnAwayName">—</div>
          <div class="banner-state" id="bnAwayRecord"></div>
        </div>
      </div>

      <!-- SCORE -->
      <div class="banner-score-block" style="margin:0 14px">
        <div class="banner-score" id="bnScore">— —</div>
        <div class="banner-score-sub" id="bnScoreSub"></div>
      </div>

      <!-- HOME TEAM -->
      <div class="banner-team">
        <div style="text-align:right">
          <div class="banner-value" id="bnHomeName">—</div>
          <div class="banner-state" id="bnHomeRecord"></div>
        </div>
        <div class="team-logo-lg" id="bnHomeLogo"></div>
      </div>

      <!-- RIGHT: count (live only) -->
      <div class="banner-sep" id="bnCountSep" style="display:none"></div>
      <div class="banner-section" id="bnCountSection" style="display:none">
        <div class="banner-label">Count</div>
        <div class="banner-count" id="bnCount">—</div>
      </div>
    </div>

    <div class="content">
      <div class="grid">

        <!-- PRE-GAME (preview only) -->
        <div class="panel grid-full" id="pregamePanel" style="display:none">
          <div class="panel-head">
            <span class="panel-title">Pre-Game Spotlight</span>
            <span class="panel-badge" id="pregameBadge">Preview</span>
          </div>
          <div class="panel-body">
            <div class="pregame-grid" id="pregameContent"></div>
          </div>
        </div>

        <!-- LIVE TICKER -->
        <div class="panel grid-wide" id="liveTickerPanel">
          <div class="panel-head">
            <span class="panel-title"><span class="live-dot" style="vertical-align:middle;margin-right:2px"></span>Live Ticker</span>
            <span class="panel-badge" id="tickerBadge"></span>
          </div>
          <div class="panel-body" id="liveTicker"><div class="empty">No plays yet</div></div>
        </div>

        <!-- GAME BUZZ -->
        <div class="panel" id="gameBuzzPanel">
          <div class="panel-head"><span class="panel-title">Game Buzz</span></div>
          <div class="panel-body" id="gameBuzz"><div class="empty">—</div></div>
        </div>

        <!-- LINEUPS -->
        <div class="panel grid-full" id="lineupsPanel" style="display:none">
          <div class="panel-head">
            <span class="panel-title">Line-ups</span>
            <span class="panel-badge" id="lineupsBadge"></span>
          </div>
          <div class="panel-body" style="padding:0">
            <div style="display:grid;grid-template-columns:1fr 1fr" id="lineupsContent"></div>
          </div>
        </div>

        <!-- CURRENT MATCHUP + IN-PLAY STATS -->
        <div class="panel grid-wide">
          <div class="panel-head">
            <span class="panel-title">Current Matchup</span>
            <span class="panel-badge" id="matchupHand"></span>
          </div>
          <div class="panel-body" id="currentMatchup"><div class="empty">—</div></div>
        </div>

        <!-- IN-PLAY STATS -->
        <div class="panel" id="inplayPanel" style="display:none">
          <div class="panel-head"><span class="panel-title">Today's Stats</span></div>
          <div class="panel-body" id="inplayStats"><div class="empty">—</div></div>
        </div>

        <!-- DUAL PITCHER CARDS -->
        <div class="panel grid-wide">
          <div class="panel-head">
            <span class="panel-title">Pitchers</span>
            <span class="panel-badge" id="pitchersBadge"></span>
          </div>
          <div class="panel-body" style="padding:0">
            <div style="display:grid;grid-template-columns:1fr 1fr;height:100%">
              <div id="awayPitcherCard" style="padding:10px 13px;border-right:1px solid var(--border-soft)"><div class="empty">—</div></div>
              <div id="homePitcherCard" style="padding:10px 13px"><div class="empty">—</div></div>
            </div>
          </div>
        </div>

        <!-- BATTER CARD -->
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Batter Intel</span></div>
          <div class="panel-body" id="batterCard"><div class="empty">—</div></div>
        </div>

        <!-- PITCH BY PITCH -->
        <div class="panel">
          <div class="panel-head">
            <span class="panel-title">Pitch By Pitch</span>
            <span class="panel-badge" id="pitchBadge"></span>
          </div>
          <div class="panel-body" id="pitchByPitch"><div class="empty">No pitches yet</div></div>
        </div>

        <!-- NEXT PITCH MODEL -->
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Next Pitch Model</span></div>
          <div class="panel-body" id="nextPitch"><div class="empty">—</div></div>
        </div>

        <!-- KEY ANGLES -->
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Key Angles</span></div>
          <div class="panel-body" id="simpleAngles"><div class="empty">—</div></div>
        </div>

        <!-- PITCHER VS BATTER -->
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Pitcher vs Batter</span></div>
          <div class="panel-body" id="pitcherVsBatter"><div class="empty">—</div></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
const state={games:[],selectedGamePk:null,level:localStorage.getItem('knowledgeLevel')||'intermediate',playStateToken:null};
const levelCopy={
  new:{
    buzzPrefix:'What\'s happening',
    nextPitch:e=>`The pitcher will most likely throw a <strong>${e.probabilities[0]?.pitchType||'Fastball'}</strong> next (${e.probabilities[0]?.probability||0}% chance). ${e.probabilities[1]?`Could also be a ${e.probabilities[1].pitchType} (${e.probabilities[1].probability}%).`:''}`
  },
  intermediate:{
    buzzPrefix:'Read',
    nextPitch:e=>`Count ${e.count} model — ${e.probabilities.map(p=>`<strong>${p.pitchType}</strong> ${p.probability}%`).join(', ')}. ${e.explanation}`
  },
  experienced:{
    buzzPrefix:'Signal',
    nextPitch:e=>`[${e.count}] ${e.probabilities.map(p=>`${p.pitchType} ${p.probability}%`).join(' · ')}`
  }
};
const $=id=>document.getElementById(id);
async function api(path){const r=await fetch(path);if(!r.ok)throw new Error(await r.text());return r.json();}
function fmtTime(iso){try{return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}catch{return ''}}

/* ── LOGOS ── */
function logoImg(teamId,size){
  if(!teamId) return `<div style="width:${size}px;height:${size}px;background:var(--border);border-radius:3px"></div>`;
  return `<img src="https://www.mlbstatic.com/team-logos/${teamId}.svg" width="${size}" height="${size}" alt="" onerror="this.style.opacity='.2'" loading="lazy" style="display:block">`;
}

/* ── FORM GUIDE (seeded from teamId for demo) ── */
function pseudoLast5(teamId){
  const outcomes=['W','L','W','W','L','W','L','L','W','W'];
  const t=Number(teamId)||1;
  return outcomes.slice(t%5,(t%5)+5);
}
function pseudoRecord(teamId){
  const t=Number(teamId)||1;
  return `${30+(t%32)}-${30+((t+7)%30)}`;
}

/* ── GAME CARDS ── */
function sortGames(g){const w={Live:0,Preview:1,Final:2};return g.sort((a,b)=>(w[a.status]-w[b.status])||(new Date(a.startTime)-new Date(b.startTime)));}
function renderGames(){
  const el=$('games');
  if(!state.games.length){el.innerHTML='<div class="empty" style="padding:16px">No games today</div>';return;}
  el.innerHTML=state.games.map(g=>{
    const sCls=g.status==='Live'?'live':g.status==='Final'?'final':'preview';
    const sTxt=g.status==='Live'?`● ${g.detailedStatus}`:g.status==='Final'?'FINAL':g.detailedStatus;
    const awayForm=pseudoLast5(g.teams.away.id); const homeForm=pseudoLast5(g.teams.home.id); const dots=arr=>arr.map(r=>`<span class="fg-dot ${r}" title="${r}"></span>`).join('');

    // Live game inline state
    const isLive=g.status==='Live';
    const isFinal=g.status==='Final';
    let liveRow='';
    if(isLive&&g.inning){
      const half=(g.inningHalf||'').toLowerCase().includes('bot')?'▼':'▲';
      liveRow=`<div class="card-live-row">
        <span class="card-inning">${half} ${g.inning}</span>
      </div>`;
    }
    if(isFinal){
      liveRow=`<div class="card-live-row"><span class="card-final-tag">FINAL</span></div>`;
    }
    return `<div class="game-card ${state.selectedGamePk===g.gamePk?'active':''}" onclick="selectGame(${g.gamePk})">
      <div class="game-status ${sCls}">${sTxt}</div>
      <div class="card-teams">
        <div class="card-team away">
          <div class="team-logo-sm">${logoImg(g.teams.away.id,20)}</div>
          <span class="team-abbr">${g.teams.away.abbr}</span>
          <span class="card-score ${isLive&&g.teams.away.score>g.teams.home.score?'card-score-lead':''}">${g.teams.away.score}</span>
        </div>
        <span class="card-sep">${isLive?'<span class="card-live-pip"></span>':'@'}</span>
        <div class="card-team home">
          <span class="card-score ${isLive&&g.teams.home.score>g.teams.away.score?'card-score-lead':''}">${g.teams.home.score}</span>
          <span class="team-abbr">${g.teams.home.abbr}</span>
          <div class="team-logo-sm">${logoImg(g.teams.home.id,20)}</div>
        </div>
      </div>
      ${liveRow}
      <div class="card-dots">
        <div class="dots-away">${dots(awayForm)}</div>
        <div class="dots-home">${dots(homeForm)}</div>
      </div>
      <div class="card-time">${isLive||isFinal?'':fmtTime(g.startTime)}</div>
    </div>`;
  }).join('');
}

/* ── BANNER ── */
function show(id,visible){$(id).style.display=visible?'':'none';}
function updateBanner(g,summary){
  if(!g)return;
  $('bnAwayLogo').innerHTML=logoImg(g.teams.away.id,32);
  $('bnHomeLogo').innerHTML=logoImg(g.teams.home.id,32);
  $('bnAwayName').textContent=g.teams.away.abbr;
  $('bnHomeName').textContent=g.teams.home.abbr;
  const bnDots=arr=>'<span style="display:inline-flex;gap:3px;vertical-align:middle;margin-left:5px">'+arr.map(r=>`<span class="fg-dot ${r}"></span>`).join('')+'</span>';
  $('bnAwayRecord').innerHTML=pseudoRecord(g.teams.away.id)+bnDots(pseudoLast5(g.teams.away.id));
  $('bnHomeRecord').innerHTML=pseudoRecord(g.teams.home.id)+bnDots(pseudoLast5(g.teams.home.id));

  const isLive = g.status==='Live';
  const isFinal = g.status==='Final';

  // Live state panel (left of score) — only during live games
  show('bnLiveState', isLive);
  show('bnLiveSep', isLive);
  show('bnCountSection', isLive);
  show('bnCountSep', isLive);

  if(summary){
    $('bnScore').textContent=`${summary.score.away} – ${summary.score.home}`;

    // Score sub: live dot + status for live, FINAL for final, start time for preview
    if(isLive){
      $('bnScoreSub').innerHTML=`<span class="live-dot"></span>${summary.status||'In Progress'}`;
    } else if(isFinal){
      $('bnScoreSub').innerHTML=`<span style="color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px">FINAL</span>`;
    } else {
      $('bnScoreSub').innerHTML=`<span style="color:var(--muted);font-size:11px">${fmtTime(g.startTime)}</span>`;
    }

    if(isLive){
      // Format inning half and number separately
      const half=(summary.half||'').toLowerCase().includes('bot')?'BOT':'TOP';
      const inn=Number(summary.inning)||1;
      const suffix=inn===1?'st':inn===2?'nd':inn===3?'rd':'th';
      $('bnHalf').textContent=half;
      $('bnInning').textContent=`${inn}${suffix}`;
      $('bnOuts').textContent=`${summary.outs??0} out${summary.outs!==1?'s':''}`;
      $('bnCount').textContent=`${summary.count?.balls??0}–${summary.count?.strikes??0}`;
      // Always explicitly set all three bases — never leave stale state
      const r=summary.runners||{};
      $('r1').className='base'+(r.first?' on':'');
      $('r2').className='base'+(r.second?' on':'');
      $('r3').className='base'+(r.third?' on':'');
    } else {
      // Clear runners when not live so stale state never shows
      ['r1','r2','r3'].forEach(id=>{ if($(id)) $(id).className='base'; });
    }
  } else {
    // No summary yet — just show score from game card data
    $('bnScore').textContent=`${g.teams.away.score} – ${g.teams.home.score}`;
    $('bnScoreSub').innerHTML='';
  }
}

/* ── SPOTLIGHT CARDS ── */
function spotlightPitcher(player,intel){
  if(!player) return '';
  const mix=intel?.pitchMix||{};
  const vel=intel?.velocityByPitch||{};
  const top=Object.entries(mix).sort((a,b)=>b[1]-a[1])[0];
  const topName=top?.[0]||'Fastball';
  const topPct=top?.[1]||0;
  const topVel=vel[topName]||null;
  const k=intel?.strikeoutRate||0;
  const whiff=intel?.whiffRate||0;
  const bb=intel?.walkRate||0;
  const fps=intel?.firstPitchStrikeTendency||0;
  const hardHit=intel?.hardHitAllowed||0;

  let lines=[];

  if(state.level==='new'){
    // Plain English — no jargon, tell a story
    if(topVel) lines.push(`His go-to pitch is the <strong>${topName}</strong>, which he throws about ${Math.round(topPct)}% of the time at around <strong>${topVel} mph</strong>.`);
    else lines.push(`He relies mostly on his <strong>${topName}</strong>, throwing it about ${Math.round(topPct)}% of the time.`);
    if(whiff>=28) lines.push(`Batters swing and miss a lot against him — he's hard to make contact with.`);
    else if(whiff<20) lines.push(`He doesn't strike many batters out, so expect plenty of balls in play.`);
    if(bb>=9) lines.push(`He sometimes struggles with control and gives out walks, which puts free runners on base.`);
    else if(fps>=62) lines.push(`He's aggressive early — he usually gets ahead of batters with his first pitch, which puts him in control.`);
    if(hardHit>=40) lines.push(`When batters do make contact, they tend to hit it hard — watch for big hits if pitches catch too much of the plate.`);

  } else if(state.level==='intermediate'){
    if(top) lines.push(`Primary pitch: <strong>${topName}</strong> ${Math.round(topPct)}%${topVel?` @ <strong>${topVel} mph</strong>`:''}`);
    if(whiff>=28) lines.push(`Above-average whiff rate (${whiff}%) — generates misses with ${topName}.`);
    if(k>=25) lines.push(`Strong strikeout pitcher at ${k}% K rate.`);
    if(bb>=9) lines.push(`Control concern — ${bb}% walk rate can get him in trouble.`);
    else if(fps>=62) lines.push(`Gets ahead early: ${fps}% first-pitch strikes.`);
    if(hardHit>=40) lines.push(`Allows hard contact at ${hardHit}% — defence will be busy.`);

  } else {
    // Experienced — dense, stat-first
    if(top) lines.push(`${topName} ${Math.round(topPct)}%${topVel?` / ${topVel} mph`:''} · K% ${k} · BB% ${bb}`);
    lines.push(`Whiff ${whiff}% · FPS ${fps}% · Hard Hit Allowed ${hardHit}%`);
  }

  return `<div class="spotlight-card is-starter">
    <div class="spotlight-top">
      <span class="spotlight-name">${player.fullName||'Pitcher'}</span>
      <span class="spotlight-badge badge-starter">SP</span>
    </div>
    ${lines.map((l,i)=>`<div class="${i===0?'spotlight-stat':'spotlight-extra'}">${l}</div>`).join('')}
  </div>`;
}

function spotlightBatter(player,intel){
  if(!player||!intel) return '';
  const isHot=intel.hotCold?.recentHot;
  const trend=intel.hotCold?.trend||0;
  const barrel=intel.barrelRate||0;
  const hardHit=intel.hardHitRate||0;
  const chase=intel.chaseTendency||0;
  const fps=intel.firstPitchSwingTendency||0;
  const contact=intel.contactTendency||0;
  const whiff=intel.whiffTendency||0;

  let lines=[];

  if(state.level==='new'){
    // Tell the story in plain English
    if(isHot) lines.push(`He's been <strong>hitting really well lately</strong> — one of the more dangerous bats in the lineup right now.`);
    else lines.push(`He's been a bit <strong>cold at the plate recently</strong> — hasn't been connecting as well as usual.`);
    if(barrel>=12) lines.push(`When he makes contact, he hits the ball really hard and far — a real power threat.`);
    else if(hardHit>=48) lines.push(`He tends to put the ball in play solidly — not a lot of weak contact from this guy.`);
    if(chase>=36) lines.push(`He can be tempted to swing at pitches outside the strike zone, especially breaking balls — pitchers will try to exploit that.`);
    else if(contact>=78) lines.push(`He makes contact very consistently — hard to strike out and puts the ball in play often.`);
    if(fps>=32) lines.push(`He likes to swing at the first pitch, so pitchers need to be careful right out of the gate.`);

  } else if(state.level==='intermediate'){
    const formTxt=isHot?`🔥 In form (trend ${trend>0?'+':''}${trend})`:`❄ Cold stretch (trend ${trend})`;
    lines.push(formTxt);
    if(barrel>=12) lines.push(`Elite barrel rate ${barrel}% — genuine power threat.`);
    if(hardHit>=48) lines.push(`Hard-hit ${hardHit}% — quality contact maker.`);
    if(chase>=36) lines.push(`Chase tendency ${chase}% — works him with breaking balls out of zone.`);
    else if(contact>=78) lines.push(`Contact rate ${contact}% — rarely strikes out.`);
    if(fps>=32) lines.push(`First-pitch aggressor at ${fps}% swing rate.`);

  } else {
    // Experienced
    lines.push(`${isHot?'HOT':'COLD'} (${trend>0?'+':''}${trend}) · Hard Hit ${hardHit}% · Barrel ${barrel}%`);
    lines.push(`Chase ${chase}% · Contact ${contact}% · FPS Swing ${fps}%`);
  }

  const cls=isHot?'is-hot':'is-cold';
  const badge=isHot?'badge-hot':'badge-cold';
  const badgeLbl=isHot?'🔥 HOT':'❄ COLD';
  return `<div class="spotlight-card ${cls}">
    <div class="spotlight-top">
      <span class="spotlight-name">${player.fullName||'Batter'}</span>
      <span class="spotlight-badge ${badge}">${badgeLbl}</span>
    </div>
    ${lines.map((l,i)=>`<div class="${i===0?'spotlight-stat':'spotlight-extra'}">${l}</div>`).join('')}
  </div>`;
}

/* Name cache so we don't re-fetch the same player twice */
const _nameCache={};
async function fetchPlayerName(pid){
  if(_nameCache[pid]) return _nameCache[pid];
  try{
    const r=await fetch(`https://statsapi.mlb.com/api/v1/people/${pid}`,{headers:{'User-Agent':'mlb-live-tracker/1.0'}});
    if(r.ok){const d=await r.json();const name=d.people?.[0]?.fullName;if(name){_nameCache[pid]=name;return name;}}
  }catch{}
  _nameCache[pid]=null;
  return null;
}

async function fetchBatterIntelForTeam(teamId){
  /* Use the MLB Stats API active roster to get real player IDs for this team */
  let pids=[];
  try{
    const r=await fetch(`https://statsapi.mlb.com/api/v1/teams/${teamId}/roster?rosterType=active`,{headers:{'User-Agent':'mlb-live-tracker/1.0'}});
    if(r.ok){
      const d=await r.json();
      /* Filter to position players (non-pitchers) and take up to 6 */
      pids=(d.roster||[])
        .filter(e=>e.position?.abbreviation&&e.position.abbreviation!=='P')
        .slice(0,6)
        .map(e=>e.person.id);
    }
  }catch{}
  /* Fallback to seeded IDs if roster call fails */
  if(!pids.length){
    const base=660000+(Number(teamId)%30)*30;
    pids=Array.from({length:4},(_,i)=>base+i);
  }

  const results=[];
  await Promise.all(pids.map(async pid=>{
    try{
      const [intelRes,name]=await Promise.all([
        api(`/api/savant/batter/${pid}`),
        fetchPlayerName(pid)
      ]);
      if(intelRes.data&&name){
        results.push({player:{fullName:name,id:pid},intel:intelRes.data});
      }
    }catch{}
  }));

  return results.sort((a,b)=>{
    const score=x=>(x.intel.hotCold?.recentHot?12:0)+(x.intel.barrelRate||0);
    return score(b)-score(a);
  });
}

/* ── PREGAME CACHE — stored so level changes re-render without re-fetching ── */
const _pregameCache={};

async function renderPregame(g){
  $('pregameBadge').textContent=`Preview · ${fmtTime(g.startTime)}`;
  const cacheKey=g.gamePk;

  let cached=_pregameCache[cacheKey];
  if(!cached){
    // Fetch everything once, store in cache
    const awayLast5=pseudoLast5(g.teams.away.id);
    const homeLast5=pseudoLast5(g.teams.home.id);
    let awayStarter=null,homeStarter=null,awayIntel=null,homeIntel=null;
    try{
      const summary=await api(`/api/live-summary?gamePk=${g.gamePk}`);
      awayStarter=summary.probableStarters?.away;
      homeStarter=summary.probableStarters?.home;
    }catch{}
    if(awayStarter?.id){try{const r=await api(`/api/savant/pitcher/${awayStarter.id}`);awayIntel=r.data;}catch{}}
    if(homeStarter?.id){try{const r=await api(`/api/savant/pitcher/${homeStarter.id}`);homeIntel=r.data;}catch{}}
    const [awayBatters,homeBatters]=await Promise.all([
      fetchBatterIntelForTeam(g.teams.away.id),
      fetchBatterIntelForTeam(g.teams.home.id)
    ]);
    cached={awayLast5,homeLast5,awayStarter,homeStarter,awayIntel,homeIntel,awayBatters,homeBatters};
    _pregameCache[cacheKey]=cached;
  }

  // Re-render from cache — fast, level-aware
  const {awayLast5,homeLast5,awayStarter,homeStarter,awayIntel,homeIntel,awayBatters,homeBatters}=cached;

  function teamSide(team,last5,starter,starterIntel,batters){
    const pillsHtml=last5.map(r=>`<span class="last5-pill ${r}">${r}</span>`).join('');
    const l5label = state.level==='new' ? 'Last 5 games' : state.level==='intermediate' ? 'Last 5' : 'L5';
    const starterLabel = state.level==='new' ? 'Starting Pitcher' : 'Probable Starter';
    const watchLabel = state.level==='new' ? 'Players to Know Today' : state.level==='intermediate' ? 'Players to Watch' : 'Key Bats';
    return `<div>
      <div class="pregame-team-header">
        <div class="pregame-logo">${logoImg(team.id,42)}</div>
        <div>
          <div class="pregame-team-name">${team.name||team.abbr}</div>
          <div class="pregame-record">${pseudoRecord(team.id)}</div>
          <div class="pregame-last5"><span class="last5-label">${l5label}</span>${pillsHtml}</div>
        </div>
      </div>
      <div class="section-label">${starterLabel}</div>
      ${starter?spotlightPitcher(starter,starterIntel):'<div class="empty" style="padding:6px 0;text-align:left;font-size:12px">TBD</div>'}
      ${batters.length?`<div class="section-label" style="margin-top:10px">${watchLabel}</div>${batters.slice(0,2).map(p=>spotlightBatter(p.player,p.intel)).join('')}`:''}
    </div>`;
  }

  $('pregameContent').innerHTML=
    teamSide(g.teams.away,awayLast5,awayStarter,awayIntel,awayBatters)+
    teamSide(g.teams.home,homeLast5,homeStarter,homeIntel,homeBatters);
}

/* ── LIVE HELPERS ── */
/* Annotate text with level-appropriate context.
   New:        plain English gloss on what to watch for
   Intermediate: brief tactical note
   Experienced: raw text, no padding */
function explain(t){
  if(!t) return '';
  if(state.level==='experienced') return t;
  const lower=t.toLowerCase();
  let note='';

  if(state.level==='new'){
    if(lower.includes('home run')||lower.includes('homers'))
      note='A home run scores everyone on base plus the batter — the biggest single play in baseball.';
    else if(lower.includes('single'))
      note='A single puts the batter on first base and can advance other runners.';
    else if(lower.includes('double'))
      note='A double gets the batter to second base — runners can often score from first on this.';
    else if(lower.includes('triple'))
      note='A triple puts the batter on third — very rare and usually scores any runners already on base.';
    else if(lower.includes('grounds out')||lower.includes('ground out'))
      note='The batter hit a ball on the ground that was fielded for an out — a routine play for the defence.';
    else if(lower.includes('flies out')||lower.includes('fly out')||lower.includes('on a fly ball'))
      note='The batter hit the ball in the air and it was caught before it landed — an out for the defence.';
    else if(lower.includes('strikeout')||lower.includes('struck out')||lower.includes('called out on strikes'))
      note='The pitcher got three strikes on the batter without them making contact — a big win for the pitcher.';
    else if(lower.includes('walk')||lower.includes('on a walk')||lower.includes('intentional'))
      note='The pitcher threw four balls, giving the batter a free pass to first base — adds a runner without a hit.';
    else if(lower.includes('wild pitch')||lower.includes('passed ball'))
      note='The pitch got away from the catcher, which can allow runners to advance to the next base for free.';
    else if(lower.includes('stolen base')||lower.includes('steals'))
      note='The runner on base sprinted to the next base while the pitcher was throwing — a momentum shift.';
    else if(lower.includes('error'))
      note='A fielder made a mistake that let the play continue — gives the batting team a free base.';
    else if(lower.includes('scores')||lower.includes('run scores'))
      note='A run crossed home plate — that goes on the scoreboard and can shift the game.';
    else if(lower.includes('double play'))
      note='Two outs recorded on the same play — the best outcome for the fielding team, ends threats instantly.';
    else if(lower.includes('force out')||lower.includes('fielder\'s choice'))
      note='The defence chose to get an out on a runner already on base rather than the batter — smart fielding.';
    else if(lower.includes('bullpen')||lower.includes('pitcher used'))
      note='The bullpen is the relief pitching staff. Using many pitchers early can leave a team thin late.';
    else if(lower.includes('score')||lower.includes('run'))
      note='Runs decide the game — scoring plays directly shift the lead.';
    else
      note='';
    if(!note) return t;
    return `${t}<div style="margin-top:4px;font-size:11px;color:var(--muted);line-height:1.4;border-left:2px solid var(--border);padding-left:6px">${note}</div>`;
  }

  // Intermediate
  if(lower.includes('home run')||lower.includes('homers'))
    note='Momentum swing — all runners score.';
  else if(lower.includes('double play'))
    note='Inning killer — defence eliminates two threats at once.';
  else if(lower.includes('strikeout')||lower.includes('struck out'))
    note='Pitcher dominates — K adds pressure on the batting side.';
  else if(lower.includes('walk'))
    note='Free base raises scoring threat, especially with runners on.';
  else if(lower.includes('stolen base')||lower.includes('steals'))
    note='Speed play — shifts run probability without a hit.';
  else if(lower.includes('wild pitch')||lower.includes('passed ball'))
    note='Passed ball advances runners — free base, no hit required.';
  else if(lower.includes('error'))
    note='Defensive miscue — extends the inning for the batting team.';
  else if(lower.includes('single')||lower.includes('double')||lower.includes('triple'))
    note='Hit puts pressure on — runner in scoring position matters here.';

  if(!note) return t;
  return `${t}<span style="display:block;margin-top:3px;font-size:11px;color:var(--muted)">${note}</span>`;
}
function callClass(c=''){const l=c.toLowerCase();if(l.includes('strike')||l.includes('swinging')||l.includes('called'))return'call-strike';if(l.includes('ball')||l.includes('intentional'))return'call-ball';if(l.includes('hit')||l.includes('foul')||l.includes('in play'))return'call-hit';return'call-other';}
function bar(label,pct,cls=''){return`<div class="bar-group"><div class="bar-label"><span>${label}</span><span>${pct}%</span></div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div></div>`;}

/* ── DIRECT MLB API LINEUP FETCH ── */
async function fetchAndRenderLineups(gamePk, matchup){
  try{
    const r=await fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live`,{headers:{'User-Agent':'mlb-live-tracker/1.0'}});
    if(!r.ok)throw new Error('lineup fetch failed');
    const d=await r.json();
    const box=d.liveData?.boxscore?.teams||{};
    const currentBatterId=matchup?.currentBatter?.id;

    function buildSide(side,teamObj){
      const battingOrder=teamObj.battingOrder||[];
      const players=teamObj.players||{};
      const lineup=battingOrder.map((pid,idx)=>{
        const p=players[`ID${pid}`];
        if(!p)return null;
        const stats=p.stats?.batting||{};
        const todayAB=stats.atBats??0;
        const todayH=stats.hits??0;
        const todayHR=stats.homeRuns??0;
        const todayRBI=stats.rbi??0;
        const todayK=stats.strikeOuts??0;
        const todayBB=stats.baseOnBalls??0;
        const season=p.seasonStats?.batting||{};
        // Always show H/AB, then add HR/K/BB badges
        let note='';
        if(todayAB>0){
          note=`${todayH}/${todayAB}`;
          if(todayHR>0) note+=` · ${todayHR}HR`;
          if(todayRBI>0&&!todayHR) note+=` · ${todayRBI}RBI`;
          if(todayK>0) note+=` · ${todayK}K`;
          if(todayBB>0) note+=` · ${todayBB}BB`;
        } else {
          note='—';
        }
        const avg=season.avg||'—';
        const obp=season.obp||'—';
        return{
          id:Number(pid),
          order:idx+1,
          name:p.person?.fullName||`Player ${pid}`,
          position:p.position?.abbreviation||'',
          todayH,todayHR,todayAB,note,
          avg,obp
        };
      }).filter(Boolean);
      return{id:teamObj.team?.id,abbr:teamObj.team?.abbreviation||side,lineup};
    }

    const data={
      away:buildSide('away',box.away||{}),
      home:buildSide('home',box.home||{}),
      currentBatterId
    };
    renderLineups(data);
  }catch(e){
    $('lineupsPanel').style.display='none';
  }
}

/* ── DIRECT MLB API IN-PLAY STATS FETCH ── */
async function fetchAndRenderInplay(gamePk, matchup){
  try{
    const r=await fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live`,{headers:{'User-Agent':'mlb-live-tracker/1.0'}});
    if(!r.ok)throw new Error();
    const d=await r.json();
    const box=d.liveData?.boxscore?.teams||{};
    const allPlays=d.liveData?.plays?.allPlays||[];
    const pitcherId=matchup?.currentPitcher?.id;
    const batterId=matchup?.currentBatter?.id;

    let pitcherData=null, batterData=null;

    // Pitcher today
    if(pitcherId){
      const findInTeam=(team)=>Object.values(team.players||{}).find(p=>p.person?.id===pitcherId);
      const pp=findInTeam(box.home)||findInTeam(box.away);
      if(pp){
        const s=pp.stats?.pitching||{};
        const season=pp.seasonStats?.pitching||{};
        const avgHook=Math.round(Number(season.inningsPitched||6)*15)||90;
        const pitchCount=s.numberOfPitches??0;
        const ip=s.inningsPitched||'0.0';
        const k=s.strikeOuts??0;
        const bb=s.baseOnBalls??0;
        const h=s.hits??0;
        const er=s.earnedRuns??0;
        const era=season.era||'—';
        const stressNote=pitchCount>=avgHook?`⚠ Over avg hook point (${avgHook}) — bullpen likely warming`
          :pitchCount>=avgHook*0.85?`Approaching hook point — watch for pull at ${avgHook} pitches`
          :`Comfortably within pitch count limit`;
        pitcherData={name:pp.person?.fullName||'Pitcher',pitchCount,inningsPitched:ip,strikeouts:k,walksAllowed:bb,hitsAllowed:h,earnedRuns:er,era,avgHook,stressNote};
      }
    }

    // Batter today — scan play log
    if(batterId){
      const findInTeam=(team)=>Object.values(team.players||{}).find(p=>p.person?.id===batterId);
      const bp=findInTeam(box.home)||findInTeam(box.away);
      if(bp){
        const s=bp.stats?.batting||{};
        const season=bp.seasonStats?.batting||{};
        const h=s.hits??0; const ab=s.atBats??0; const hr=s.homeRuns??0; const rbi=s.rbi??0;
        const summary=ab>0?`${h}/${ab}${hr>0?` · ${hr}HR`:''}${rbi>0?` · ${rbi}RBI`:''}` :'No AB yet';
        // Build PA log from play history
        const pas=allPlays.filter(p=>p.matchup?.batter?.id===batterId).map(p=>({
          inning:p.about?.inning,
          half:p.about?.halfInning,
          result:p.result?.description||p.result?.event||'—',
          pitchCount:p.playEvents?.filter(e=>e.isPitch).length||0,
          scoringPlay:p.about?.isScoringPlay||false
        }));
        batterData={name:bp.person?.fullName||'Batter',summary,seasonAvg:season.avg||'.000',seasonOBP:season.obp||'.000',paDetails:pas};
      }
    }

    renderInplayStats({pitcher:pitcherData,batter:batterData});
  }catch(e){
    $('inplayPanel').style.display='none';
  }
}

async function loadSlate(renderOnly=false){
  try{
    const data=await api('/api/schedule');
    state.games=sortGames(data.games);
    if(data.date)$('sidebarDate').textContent=data.date;
    if(!state.selectedGamePk&&state.games.length)state.selectedGamePk=state.games[0].gamePk;
    renderGames();
    if(state.selectedGamePk&&!renderOnly)await refreshGame();
  }catch(e){$('games').innerHTML='<div class="empty" style="padding:16px">Failed to load schedule</div>';}
}

/* Poll the schedule every 20s to keep sidebar scores + inning live.
   Only re-render the selected game panel when the play token changes. */
async function pollAllGames(){
  try{
    const data=await api('/api/schedule');
    const hadLive=state.games.some(g=>g.status==='Live');
    state.games=sortGames(data.games);
    renderGames(); // update sidebar scores/inning for all games
    // If the selected game is live, refresh the main panel every poll cycle
    // (runners + count change on every pitch, not just play token changes)
    const sel=state.games.find(x=>x.gamePk===state.selectedGamePk);
    if(sel&&sel.status==='Live'){
      try{
        const feed=await api(`/api/pitch-feed?gamePk=${state.selectedGamePk}`);
        // Always do a full refresh so runners/count/inning stay current
        await refreshGame();
      }catch{}
    }
    // If a game just went live (was Preview, now Live) and it's selected, full refresh
    if(!hadLive&&state.games.some(g=>g.status==='Live')&&sel?.status==='Live')await refreshGame();
  }catch{}
}

function updateBannerScore(g){
  if(!g||!state.selectedGamePk||g.gamePk!==state.selectedGamePk)return;
  $('bnScore').textContent=`${g.teams.away.score} – ${g.teams.home.score}`;
}

async function selectGame(gamePk){
  state.selectedGamePk=gamePk;state.playStateToken=null;
  renderGames();await refreshGame();
}
window.selectGame=selectGame;

/* ── REFRESH ── */
async function refreshGame(){
  const gamePk=state.selectedGamePk;
  if(!gamePk)return;
  const g=state.games.find(x=>x.gamePk===gamePk);
  if(!g)return;
  updateBanner(g,null);

  if(g.status==='Preview'){
    $('pregamePanel').style.display='';
    $('liveTickerPanel').style.display='none';
    $('gameBuzzPanel').style.display='none';
    $('lineupsPanel').style.display='none';
    $('inplayPanel').style.display='none';
    // Clear dual pitcher panel
    $('awayPitcherCard').innerHTML='<div class="empty">Game not started</div>';
    $('homePitcherCard').innerHTML='<div class="empty">Game not started</div>';
    ['currentMatchup','batterCard','pitchByPitch','nextPitch','simpleAngles','pitcherVsBatter']
      .forEach(id=>$(id).innerHTML='<div class="empty">Game not started</div>');
    $('pregameContent').innerHTML='<div class="loading"><div class="spin"></div> Loading pre-game data…</div>';
    await renderPregame(g);
    return;
  }

  $('pregamePanel').style.display='none';
  $('liveTickerPanel').style.display='';
  $('gameBuzzPanel').style.display='';
  $('lineupsPanel').style.display='';
  $('inplayPanel').style.display='';

  try{
    const [summary,feed,matchup,buzz]=await Promise.all([
      api(`/api/live-summary?gamePk=${gamePk}`),
      api(`/api/pitch-feed?gamePk=${gamePk}`),
      api(`/api/matchup?gamePk=${gamePk}`),
      api(`/api/game-buzz?gamePk=${gamePk}`)
    ]);
    updateBanner(g,summary);

    // Fetch lineups and in-play stats directly from MLB API
    fetchAndRenderLineups(gamePk, matchup);
    fetchAndRenderInplay(gamePk, matchup);

    $('liveTicker').innerHTML=feed.recentPlays.length
      ?feed.recentPlays.slice().reverse().map(p=>{
        const evLine=p.exitVelocity?`<div style="margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${p.hardHit?'var(--red)':'var(--gold)'}">EV ${p.exitVelocity} mph</span>
          ${p.launchAngle!=null?`<span style="font-size:11px;color:var(--muted)">LA ${p.launchAngle}°</span>`:''}
          ${p.totalDistance?`<span style="font-size:11px;color:var(--muted)">${p.totalDistance} ft</span>`:''}
          ${p.hardHit?`<span style="font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;color:var(--red);background:var(--red-dim);padding:1px 5px;border-radius:3px">HARD HIT</span>`:''}
        </div>`:'';
        return `<div class="item">
          <span class="tag ${p.scoringPlay?'tag-live':'tag-info'}">${p.half||''} ${p.inning||''}</span>${p.scoringPlay?'🔥 ':''}
          <span>${explain(p.description||'—')}</span>
          ${evLine}
        </div>`;
      }).join('')
      :'<div class="empty">No recent plays</div>';
    $('tickerBadge').textContent=feed.recentPlays.length?`${feed.recentPlays.length} plays`:'';

    // Determine which team is pitching vs batting from the inning half
    // Top = away bats, home pitches | Bottom = home bats, away pitches
    const isBottom=(summary.half||'').toLowerCase().includes('bot');
    const pitcherTeamId=isBottom?g.teams.away.id:g.teams.home.id;
    const batterTeamId=isBottom?g.teams.home.id:g.teams.away.id;
    const pitcherHand=matchup.pitcherVsBatter?.handedness?.split(' vs ')?.[0]||'R';
    const batterSide=matchup.pitcherVsBatter?.handedness?.split(' vs ')?.[1]||'R';

    $('currentMatchup').innerHTML=`<div class="matchup-display">
      <div class="matchup-player">
        <div class="matchup-role">Pitcher</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:5px;margin:4px 0">
          <div style="width:20px;height:20px;border-radius:3px;overflow:hidden">${logoImg(pitcherTeamId,18)}</div>
          <div class="matchup-name">${matchup.currentPitcher?.fullName||'TBD'}</div>
        </div>
        <div class="matchup-hand">${pitcherHand}HP</div>
      </div>
      <div class="matchup-vs">VS</div>
      <div class="matchup-player">
        <div class="matchup-role">Batter</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:5px;margin:4px 0">
          <div style="width:20px;height:20px;border-radius:3px;overflow:hidden">${logoImg(batterTeamId,18)}</div>
          <div class="matchup-name">${matchup.currentBatter?.fullName||'TBD'}</div>
        </div>
        <div class="matchup-hand">Bats ${batterSide}</div>
      </div>
    </div>
    ${matchup.pitcherVsBatter?.handedness?`<div style="margin-top:8px;font-size:12px;color:var(--sub);text-align:center">Handedness: <strong style="color:var(--text)">${matchup.pitcherVsBatter.handedness}</strong></div>`:''}`;
    $('matchupHand').textContent=matchup.pitcherVsBatter?.handedness||'';

    $('pitchBadge').textContent=feed.pitchEvents.length?`${feed.pitchEvents.length} pitches`:'';
    $('pitchByPitch').innerHTML=feed.pitchEvents.length
      ?feed.pitchEvents.slice().reverse().map(p=>{
        const evBadge=p.exitVelocity?`<span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:${p.hardHit?'var(--red)':'var(--gold)'}">EV ${p.exitVelocity}mph${p.launchAngle!=null?' · '+p.launchAngle+'°':''}</span>`:'';
        return `<div class="pitch-row" style="grid-template-columns:22px 1fr auto auto auto ${p.exitVelocity?'auto':''}">
          <div class="pitch-num">#${p.pitchNumber}</div>
          <div class="pitch-desc">${p.type||p.details||'—'}</div>
          <div class="pitch-spd">${p.startSpeed?p.startSpeed+' mph':'—'}</div>
          <div class="pitch-call ${callClass(p.call||p.details)}">${p.call||p.details||'—'}</div>
          <div class="pitch-cnt">${p.count}</div>
          ${evBadge?`<div>${evBadge}</div>`:''}
        </div>`;
      }).join('')
      :'<div class="empty">No pitches yet</div>';

    const pid=matchup.currentPitcher?.id;
    const bid=matchup.currentBatter?.id;
    const activePitcherId=matchup.activePitcherId||pid;

    // Render both pitchers side by side
    $('pitchersBadge').textContent=`${g.teams.away.abbr} vs ${g.teams.home.abbr}`;
    async function renderSidePitcher(pitcherObj, teamId, containerId){
      if(!pitcherObj?.id){ $(containerId).innerHTML='<div class="empty">TBD</div>'; return; }
      const isActive=pitcherObj.id===activePitcherId||pitcherObj.id===pid;
      try{
        const p=await api(`/api/savant/pitcher/${pitcherObj.id}`);
        $(containerId).innerHTML=renderPitcherCard(p.data, pitcherObj.fullName||pitcherObj.name, teamId, isActive);
      }catch{
        $(containerId).innerHTML=`<div class="empty">${pitcherObj.fullName||'Pitcher'} — intel unavailable</div>`;
      }
    }
    renderSidePitcher(matchup.awayPitcher, g.teams.away.id, 'awayPitcherCard');
    renderSidePitcher(matchup.homePitcher, g.teams.home.id, 'homePitcherCard');

    if(bid){try{const b=await api(`/api/savant/batter/${bid}`);$('batterCard').innerHTML=renderBatterCard(b.data);}catch{$('batterCard').innerHTML='<div class="empty">Unavailable</div>';}}
    else $('batterCard').innerHTML='<div class="empty">—</div>';

    $('pitcherVsBatter').innerHTML=(matchup.pitcherVsBatter?.notes||[]).map(n=>`<div class="item">${explain(n)}</div>`).join('')||'<div class="empty">—</div>';
    $('simpleAngles').innerHTML=(matchup.simpleAngles||[]).map(a=>`<div class="angle-card"><div class="angle-title">${a.angle}</div><div class="angle-why">${explain(a.why)}</div></div>`).join('')||'<div class="empty">—</div>';

    const exp=matchup.nextPitchExpectation;
    $('nextPitch').innerHTML=exp?`<div style="font-size:12px;color:var(--sub);margin-bottom:8px">${levelCopy[state.level].nextPitch(exp)}</div><div class="pitch-probs">${exp.probabilities.map((p,i)=>`<div class="pitch-chip ${i===0?'top':''}"><div class="pitch-type">${p.pitchType}</div><div class="pitch-pct">${p.probability}%</div><div class="pitch-unit">probability</div></div>`).join('')}</div>`:'<div class="empty">—</div>';
    // ── GAME BUZZ — built client-side for richer, runner-aware signals ──
    const buzzItems=[];
    const r=summary.runners||{};
    const runnersOn=[r.first,r.second,r.third].filter(Boolean).length;
    const balls=summary.count?.balls??0;
    const strikes=summary.count?.strikes??0;
    const outs=summary.outs??0;
    const awayScore=summary.score?.away??0;
    const homeScore=summary.score?.home??0;
    const scoreDiff=Math.abs(awayScore-homeScore);
    const inning=Number(summary.inning)||1;
    const isBot=(summary.half||'').toLowerCase().includes('bot');
    const pitchCount=feed.pitchEvents?.length||0;

    // Hard hit ball alert from most recent play
    const lastPlay=feed.recentPlays?.[feed.recentPlays.length-1];
    if(lastPlay?.hardHit) buzzItems.push({type:'contact',dot:'red',text:`Hard hit ball — exit velocity ${lastPlay.exitVelocity} mph${lastPlay.totalDistance?` · ${lastPlay.totalDistance} ft`:''} on the last play. High-damage contact.`});

    // Runner situations
    if(r.second&&r.third) buzzItems.push({type:'threat',dot:'red',text:'Runners on 2nd and 3rd — scoring position with multiple threats. Any contact could score runs.'});
    else if(r.first&&r.second) buzzItems.push({type:'threat',dot:'red',text:'Runners on 1st and 2nd — double play in order but also a gap hit scores two.'});
    else if(r.first&&r.third) buzzItems.push({type:'threat',dot:'red',text:'Runners on the corners — a single, wild pitch or passed ball could score the runner from 3rd.'});
    else if(r.third) buzzItems.push({type:'threat',dot:'amber',text:'Runner on 3rd — in scoring position. A sacrifice fly, single or wild pitch could score here.'});
    else if(r.second) buzzItems.push({type:'threat',dot:'amber',text:'Runner on 2nd — in scoring position. A single to the outfield likely scores this runner.'});

    // Count pressure
    if(balls===3&&strikes===2) buzzItems.push({type:'count',dot:'red',text:'Full count — 3-2. Next pitch decides the at-bat. Batter can run on contact, maximum pressure on the pitcher.'});
    else if(balls===3) buzzItems.push({type:'count',dot:'amber',text:'3 balls — pitcher one away from a walk. Likely throwing a strike here, batter can look for something to drive.'});
    else if(strikes===2&&runnersOn>0) buzzItems.push({type:'count',dot:'amber',text:'2-strike count with runners on — pitcher has the edge but one mistake could do damage.'});

    // Outs context
    if(outs===2&&runnersOn>0) buzzItems.push({type:'situational',dot:'blue',text:`2 outs with ${runnersOn===1?'a runner':'runners'} on — 2-out RBI situation. Pitcher needs just one more out to escape.`});

    // Late inning pressure
    if(inning>=7&&scoreDiff<=2) buzzItems.push({type:'leverage',dot:'red',text:`Late game (${scoreDiff===0?'tied':scoreDiff+'-run game'}) in the ${inning>=9?'9th':'late innings'} — every pitch is high leverage now.`});
    else if(inning>=7&&scoreDiff===0) buzzItems.push({type:'leverage',dot:'red',text:'Tie game in the late innings — maximum leverage situation.'});

    // Long at-bat
    if(pitchCount>=6) buzzItems.push({type:'battle',dot:'blue',text:`${pitchCount}-pitch at-bat in progress — extended battle means more pitches on the starter, could force bullpen earlier.`});

    // Recent scoring
    const recentScoring=feed.recentPlays?.filter(p=>p.scoringPlay)?.slice(-2)||[];
    if(recentScoring.length>=2) buzzItems.push({type:'momentum',dot:'live',text:'Back-to-back scoring plays — significant momentum swing. Watch for a pitching change or adjustment.'});
    else if(recentScoring.length===1) buzzItems.push({type:'momentum',dot:'amber',text:`Scoring play just recorded: ${recentScoring[0].description||'run scored'}. Game state changed.`});

    // Bullpen watch from pitch feed play count
    const totalPlays=feed.recentPlays?.length||0;
    const starterNote=matchup.starterInfo;
    if(inning>=6) buzzItems.push({type:'bullpen',dot:'blue',text:`${inning>=7?'Late game':'Middle innings'} — bullpen decisions become critical. Relief arm quality could determine the result.`});

    // Close game general
    if(scoreDiff===0&&inning>=5) buzzItems.push({type:'general',dot:'blue',text:'Tied game — both teams pitching and defending for every out. Run environment is tight.'});
    else if(scoreDiff===1&&inning>=6) buzzItems.push({type:'general',dot:'amber',text:'One-run game in the late innings — a single swing can flip this.'});

    // Fallback
    if(!buzzItems.length) buzzItems.push({type:'steady',dot:'muted',text:'Game state is stable — no immediate high-leverage situation flagged.'});

    const dotColor={red:'var(--red)',amber:'var(--gold)',blue:'var(--blue)',live:'var(--live)',muted:'var(--muted)'};
    $('gameBuzz').innerHTML=buzzItems.slice(0,5).map(b=>`
      <div class="buzz-item">
        <div class="buzz-dot" style="background:${dotColor[b.dot]||'var(--blue)'}"></div>
        <div class="buzz-text">${state.level!=='new'?`<strong>${b.type.charAt(0).toUpperCase()+b.type.slice(1)}:</strong> `:''}${b.text}</div>
      </div>`).join('');

    state.playStateToken=feed.playStateToken;
  }catch(e){console.error('Refresh failed:',e);}
}

async function pollLive(){
  // kept as no-op — polling now handled by pollAllGames
}

$('knowledgeLevel').value=state.level;
$('knowledgeLevel').addEventListener('change',async e=>{state.level=e.target.value;localStorage.setItem('knowledgeLevel',state.level);await refreshGame();});
$('refreshSlate').addEventListener('click',()=>loadSlate());
loadSlate();
setInterval(pollAllGames, 20000); // every 20s: update sidebar scores + check for play changes
</script>
